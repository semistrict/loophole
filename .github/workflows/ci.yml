name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: ./deps.sh setup
      - run: make build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: ./deps.sh setup
      - run: make test

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
      - run: ./deps.sh setup
      - run: make check

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build, test, check]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
      - run: docker compose up -d s3
      - run: docker compose run --rm go sh -c './deps.sh setup && make e2e'
