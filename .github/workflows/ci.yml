name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
      - run: make check

  e2e-fuse:
    runs-on: ubuntu-latest
    needs: [build, test, check]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
      - run: docker compose up -d s3
      - run: docker compose run --rm go make e2e-fuse

  e2e-nbd:
    runs-on: ubuntu-latest
    needs: [build, test, check]
    steps:
      - uses: actions/checkout@v4
      - run: sudo modprobe nbd nbds_max=16
      - run: docker compose build
      - run: docker compose up -d s3
      - run: docker compose run --rm go make e2e-nbd

  e2e-nbd-tcp:
    runs-on: ubuntu-latest
    needs: [build, test, check]
    steps:
      - uses: actions/checkout@v4
      - run: sudo modprobe nbd nbds_max=16
      - run: docker compose build
      - run: docker compose up -d s3
      - run: docker compose run --rm go make e2e-testnbdtcp
