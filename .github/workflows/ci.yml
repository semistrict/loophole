name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
      - run: make check

  e2e-fuse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, test, check]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: docker compose build
      - run: docker compose up -d s3
      - run: docker compose run --rm go make e2e-fuse

  e2e-nbd:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, test, check]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: sudo modprobe nbd nbds_max=16
      - run: docker compose build
      - run: docker compose up -d s3
      - run: docker compose run --rm go make e2e-nbd

  # Disabled: pre-existing NBD-TCP netlink race in torture test
  # e2e-nbd-tcp:
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   needs: [build, test, check]
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         submodules: true
  #     - run: sudo modprobe nbd nbds_max=16
  #     - run: docker compose build
  #     - run: docker compose up -d s3
  #     - run: docker compose run --rm go make e2e-testnbdtcp

  e2e-lwext4fuse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, test, check]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: docker compose build
      - run: docker compose up -d s3
      - run: docker compose run --rm go make e2e-lwext4fuse

  e2e-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, test, check]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: docker compose build
      - run: docker compose up -d s3
      - run: docker compose run --rm go make e2e-sqlite

