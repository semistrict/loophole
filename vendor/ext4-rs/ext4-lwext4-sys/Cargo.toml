[package]
name = "ext4-lwext4-sys"
version.workspace = true
edition.workspace = true
license.workspace =  true
authors.workspace = true
repository.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "FFI bindings to lwext4 - a lightweight ext2/3/4 filesystem implementation"
keywords = ["ext4", "ext3", "ext2", "ffi", "lwext4"]
categories = ["external-ffi-bindings", "filesystem"]
links = "lwext4"

[features]
default = []

# Individual GPL-licensed features
gpl-xattr = []      # ext4_xattr.c - extended attributes support
gpl-extents = []    # ext4_extents.c - advanced extents implementation

# Enable all GPL features
gpl = ["gpl-xattr", "gpl-extents"]


[build-dependencies]
cc = "1.0"

[package.metadata.docs.rs]
features = ["gpl"]