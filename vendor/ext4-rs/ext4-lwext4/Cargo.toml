[package]
name = "ext4-lwext4"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "A safe Rust wrapper for ext2/3/4 filesystem operations based on lwext4"
keywords = ["ext4", "ext3", "ext2", "filesystem", "embedded"]
categories = ["filesystem", "no-std"]

[dependencies]
ext4-lwext4-sys = { version = "0.1.2", path = "../ext4-lwext4-sys" }
thiserror = "1.0"
bitflags = "2.0"
libc = "0.2"

[dev-dependencies]
tempfile = "3.0"

[features]
default = ["std"]
std = []

# GPL-licensed features (passed through to ext4-lwext4-sys)
gpl-xattr = ["ext4-lwext4-sys/gpl-xattr"]
gpl-extents = ["ext4-lwext4-sys/gpl-extents"]
gpl = ["ext4-lwext4-sys/gpl"]
