services:
  s3:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - s3-data:/data
      - s3-logs:/logs

  e2e:
    build: .
    privileged: true
    entrypoint: ["sleep", "infinity"]
    environment:
      S3_ENDPOINT: http://s3:9000
      BUCKET: testbucket
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_REGION: us-east-1
      UV_LINK_MODE: copy
    volumes:
      - ./tests:/tests
    depends_on:
      - s3
    devices:
      - /dev/fuse

volumes:
  s3-data:
  s3-logs:
