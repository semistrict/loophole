services:
  s3:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - s3-data:/data
      - s3-logs:/logs

  go:
    build: .
    privileged: true
    environment:
      GOMEMLIMIT: 512MiB
      S3_ENDPOINT: http://s3:9000
      BUCKET: testbucket
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_REGION: us-east-1
      LOOPHOLE_S3_URL: s3://testbucket
    volumes:
      - .:/app
      - go-mod:/go/pkg/mod
      - go-cache:/root/.cache/go-build
      - ./docker-config:/root/.loophole-config
      - loophole-data:/root/.loophole
      - /tmp/linux-clone-test/linux:/mnt/linux-src:ro
    depends_on:
      - s3
    devices:
      - /dev/fuse

volumes:
  s3-data:
  s3-logs:
  go-mod:
  go-cache:
  loophole-data:
