<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loophole Console</title>
    <script type="module" src="./index.ts"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #1a1a2e; color: #e0e0e0; font-family: monospace; }
      #app { display: flex; flex-direction: column; height: 100%; }
      #toolbar {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 12px; background: #16213e; border-bottom: 1px solid #0f3460;
        font-size: 13px;
      }
      #toolbar span { color: #e94560; font-weight: bold; }
      #toolbar .status { margin-left: auto; color: #888; }
      #toolbar .actions { display: none; gap: 6px; margin-left: 12px; }
      #toolbar .actions button {
        padding: 4px 10px; background: #0f3460; border: 1px solid #1a3a6e;
        border-radius: 3px; color: #e0e0e0; font-family: monospace; font-size: 12px;
        cursor: pointer;
      }
      #toolbar .actions button:hover:not(:disabled) { background: #1a4a80; }
      #toolbar .actions button:disabled { opacity: 0.4; cursor: not-allowed; }
      #toolbar .actions button.unmount-btn { border-color: #e94560; color: #e94560; }
      #toolbar .actions button.unmount-btn:hover { background: #2a1525; }
      #terminal { flex: 1; display: none; }

      /* Volume picker */
      #volume-picker {
        flex: 1; display: flex; align-items: center; justify-content: center;
      }
      #volume-picker .picker-box {
        background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
        padding: 24px 32px; min-width: 360px; max-width: 480px;
      }
      #volume-picker h2 {
        font-size: 16px; color: #e94560; margin-bottom: 16px;
      }
      #volume-picker .section-label {
        font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #volume-picker .volume-list {
        list-style: none; max-height: 200px; overflow-y: auto;
        margin-bottom: 16px; border: 1px solid #0f3460; border-radius: 4px;
      }
      #volume-picker .volume-list.empty {
        border: none; margin-bottom: 8px;
      }
      #volume-picker .volume-list li {
        padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #0f3460;
        transition: background 0.1s;
      }
      #volume-picker .volume-list li:last-child { border-bottom: none; }
      #volume-picker .volume-list li:hover { background: #0f3460; }
      #volume-picker .empty-msg {
        color: #666; font-size: 12px; padding: 8px 0;
      }
      #volume-picker .divider {
        border: none; border-top: 1px solid #0f3460; margin: 12px 0;
      }
      #volume-picker .create-row {
        display: flex; gap: 8px;
      }
      .picker-input {
        flex: 1; padding: 8px 10px; background: #1a1a2e; border: 1px solid #0f3460;
        border-radius: 4px; color: #e0e0e0; font-family: monospace; font-size: 13px;
        outline: none;
      }
      .picker-input:focus { border-color: #e94560; }
      .picker-input::placeholder { color: #555; }
      .picker-btn {
        padding: 8px 16px; background: #e94560; border: none; border-radius: 4px;
        color: #fff; font-family: monospace; font-size: 13px; cursor: pointer;
        white-space: nowrap;
      }
      .picker-btn:hover { background: #c73e54; }
      .picker-btn:disabled { background: #555; cursor: not-allowed; }
      .picker-btn.secondary { background: #0f3460; }
      .picker-btn.secondary:hover { background: #1a4a80; }
      #volume-picker .error, #dialog-overlay .error {
        color: #e94560; font-size: 12px; margin-top: 8px;
      }

      /* Dialog overlay for snapshot/clone */
      #dialog-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.5); z-index: 100;
        align-items: center; justify-content: center;
      }
      #dialog-overlay.active { display: flex; }
      #dialog-overlay .dialog-box {
        background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
        padding: 20px 28px; min-width: 340px;
      }
      #dialog-overlay h3 {
        font-size: 14px; color: #e94560; margin-bottom: 12px;
      }
      #dialog-overlay .dialog-row {
        display: flex; gap: 8px; margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <span>loophole</span>
        <span style="color:#888">console</span>
        <div class="actions" id="actions">
          <button id="snapshot-btn">snapshot</button>
          <button id="clone-btn">clone</button>
          <button class="unmount-btn" id="unmount-btn">unmount</button>
        </div>
        <div class="status" id="status">initializing...</div>
      </div>
      <div id="volume-picker">
        <div class="picker-box">
          <h2>Select Volume</h2>
          <div class="section-label">Existing volumes</div>
          <ul class="volume-list" id="volume-list"></ul>
          <hr class="divider" />
          <div class="section-label">Create new volume</div>
          <div class="create-row">
            <input type="text" class="picker-input" id="new-volume-name" placeholder="volume name" />
            <button class="picker-btn" id="create-btn">Create</button>
          </div>
          <div class="error" id="picker-error"></div>
        </div>
      </div>
      <div id="terminal"></div>
    </div>
    <div id="dialog-overlay">
      <div class="dialog-box">
        <h3 id="dialog-title"></h3>
        <div class="dialog-row">
          <input type="text" class="picker-input" id="dialog-input" placeholder="" />
          <button class="picker-btn" id="dialog-ok">OK</button>
          <button class="picker-btn secondary" id="dialog-cancel">Cancel</button>
        </div>
        <div class="error" id="dialog-error"></div>
      </div>
    </div>
  </body>
</html>
